<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="description" content="An offline-first Japanese study journal for kana practice, Anki deck review, and spaced repetition progress." />
    <title>Kiroku | Japanese Study Journal</title>
    <!-- Web Manifest Link for PWA Installation -->
    <link rel="manifest" href="/manifest.json" />
    <!-- iOS / Safari: Home screen and pinned tab support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Kiroku" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/icon.svg" color="#4f46e5" />
    <!-- Favicon (SVG for modern browsers, PNG fallback) -->
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="shortcut icon" href="/icon-192.png" />
    <!-- Legacy ICO fallback -->
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <!-- Apply dark theme before first paint to avoid a light flash -->
    <script>
      try {
        var kirokuTheme = localStorage.getItem("kiroku_theme_v1");
        if (kirokuTheme === "dark" || (kirokuTheme !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.classList.add("dark");
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Service Worker Registration Script -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/sw.js")
            .then((registration) => {
              console.log("[PWA Service Worker] Registered successfully with scope:", registration.scope);

              // Handle updates
              registration.onupdatefound = () => {
                const installingWorker = registration.installing;
                if (installingWorker == null) return;
                installingWorker.onstatechange = () => {
                  if (installingWorker.state === 'installed') {
                    if (navigator.serviceWorker.controller) {
                      console.log('New content is available; please refresh.');
                      if (window.confirm('New version of Kiroku is available. Refresh to update?')) {
                        window.location.reload();
                      }
                    } else {
                      console.log('Content is cached for offline use.');
                    }
                  }
                };
              };
            })
            .catch((error) => {
              console.error("[PWA Service Worker] Registration failed:", error);
            });
        });
      }
    </script>
  </body>
</html>
